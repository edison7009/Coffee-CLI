# Coffee Mode — Multi-platform CI Pipeline
# Triggers on push to main branch

main:
  push:
    # ─── Linux Build (x86_64) ──────────────────────────────────────────
    - name: build-linux
      docker:
        image: ubuntu:22.04
      env:
        CARGO_TERM_COLOR: always
        RUST_BACKTRACE: 1
      stages:
        - name: Install system dependencies
          script: |
            apt-get update -y
            apt-get install -y \
              build-essential curl wget git pkg-config \
              libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              unzip file

        - name: Install Rust
          script: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            rustc --version
            cargo --version

        - name: Install Node.js
          script: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            node --version
            npm --version

        - name: Install frontend dependencies
          script: |
            cd src-ui
            npm install --no-audit --no-fund
            cd ..

        - name: Check free-code sidecar
          script: |
            # free-code sidecar binary is optional.
            # When available, place pre-built binary in binaries/ directory.
            # Coffee Mode falls back to claude CLI if sidecar is not bundled.
            if [ -f "binaries/free-code" ]; then
              echo "✅ free-code sidecar binary found"
              ls -lh binaries/free-code
            else
              echo "ℹ️ No free-code sidecar — will use claude CLI fallback"
            fi

        - name: Build frontend
          script: |
            cd src-ui
            npm run build
            cd ..

        - name: Build Tauri (Linux .deb + .AppImage)
          script: |
            . "$HOME/.cargo/env"
            cargo install tauri-cli --version "^2"
            cargo tauri build
            echo "═══ Build Artifacts ═══"
            find target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \) | head -20

        - name: Upload artifacts
          script: |
            echo "📦 Linux build artifacts:"
            ls -lh target/release/bundle/deb/ 2>/dev/null || true
            ls -lh target/release/bundle/appimage/ 2>/dev/null || true

    # ── NOTE ──────────────────────────────────────────────────────────────
    # Windows & macOS builds require native runners (WebView2 / Cocoa).
    # - Windows: build locally with `cargo tauri build`
    # - macOS: use GitHub Actions with macos-latest runner
