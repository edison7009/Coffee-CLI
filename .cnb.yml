# Coffee Mode — Multi-platform CI Pipeline
# Triggers on push to main branch

main:
  push:
    # ─── Linux Build (x86_64) ──────────────────────────────────────────
    - name: build-linux
      docker:
        image: ubuntu:22.04
      env:
        CARGO_TERM_COLOR: always
        RUST_BACKTRACE: 1
      stages:
        - name: Install system dependencies
          script: |
            apt-get update -y
            apt-get install -y \
              build-essential curl wget git pkg-config \
              libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              unzip file

        - name: Install Rust
          script: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            rustc --version
            cargo --version

        - name: Install Bun
          script: |
            curl -fsSL https://bun.sh/install | bash
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun --version

        - name: Install Node.js
          script: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            node --version
            npm --version

        - name: Build CoffeeCode CLI binary
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            # Skip integrity checks for cross-platform optional tarballs (e.g. sst-win32-x64)
            export BUN_CONFIG_NO_VERIFY=1
            # Clone fresh upstream source
            rm -rf .opencode-upstream
            git clone https://cnb.cool/Coffee-2026/Coffee-Code.git .opencode-upstream
            cd .opencode-upstream
            # Remove lockfile to prevent tarball integrity hash mismatches for optional deps (like sst-win32)
            rm -f bun.lock
            bun install --no-verify
            cd packages/opencode
            # Heartbeat: prevent CNB from killing silent long-running compilation
            ( while true; do sleep 120; echo "[heartbeat] still compiling... $(date)"; done ) &
            HEARTBEAT_PID=$!
            trap "kill $HEARTBEAT_PID 2>/dev/null" EXIT
            bun run build --single --skip-embed-web-ui
            kill $HEARTBEAT_PID 2>/dev/null || true
            trap - EXIT
            # Copy the compiled binary to Coffee Mode binaries/
            mkdir -p ../../../binaries
            cp dist/opencode-linux-x64/bin/opencode ../../../binaries/coffeecode
            echo "✅ CoffeeCode binary built successfully"
            ls -lh ../../../binaries/coffeecode

        - name: Install frontend dependencies
          script: |
            cd src-ui
            npm install --no-audit --no-fund
            cd ..

        - name: Build frontend
          script: |
            cd src-ui
            npm run build
            cd ..

        - name: Build Tauri (Linux .deb only)
          script: |
            . "$HOME/.cargo/env"
            cargo install tauri-cli --version "^2"
            # Limit bundling to .deb to avoid FUSE mount errors from AppImage in Docker
            cargo tauri build --bundles deb
            echo "═══ Build Artifacts ═══"
            find target/release/bundle -type f -name "*.deb" | head -20

        - name: Upload artifacts
          exports:
            artifacts: target/release/bundle/deb/*.deb
          script: |
            echo "📦 Exporting Linux build artifacts to CNB pipeline attachments..."
            ls -lh target/release/bundle/deb/ 2>/dev/null || true
            ls -lh target/release/bundle/appimage/ 2>/dev/null || true

    # ── NOTE ──────────────────────────────────────────────────────────────
    # Windows & macOS builds require native runners (WebView2 / Cocoa).
    # - Windows: build locally with `cargo tauri build`
    # - macOS: use GitHub Actions with macos-latest runner
