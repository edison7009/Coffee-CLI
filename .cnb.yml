# Coffee Mode — Multi-platform CI Pipeline
# Triggers on push to main branch

main:
  push:
    # ─── Linux Build (x86_64) ──────────────────────────────────────────
    - name: build-linux
      docker:
        image: ubuntu:22.04
      env:
        CARGO_TERM_COLOR: always
        RUST_BACKTRACE: 1
      stages:
        - name: Install system dependencies
          script: |
            apt-get update -y
            apt-get install -y \
              build-essential curl wget git pkg-config \
              libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev \
              libayatana-appindicator3-dev librsvg2-dev \
              unzip file

        - name: Install Rust
          script: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            . "$HOME/.cargo/env"
            rustc --version
            cargo --version

        - name: Install Bun
          script: |
            curl -fsSL https://bun.sh/install | bash
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            bun --version

        - name: Install Node.js
          script: |
            curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
            apt-get install -y nodejs
            node --version
            npm --version

        - name: Build CoffeeCode CLI binary
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"
            # CNB CI 环境下该目录通常是空的或者由于 Git Submodule 不完整导致无法拉取
            # 我们直接在流水线里暴力拉取最新的 Coffee-Code 源码
            rm -rf .opencode-upstream
            git clone https://cnb.cool/Coffee-2026/Coffee-Code.git .opencode-upstream
            cp scripts/rename.cjs .opencode-upstream/
            cd .opencode-upstream
            # 运行批量套壳/品牌混淆脚本
            node rename.cjs
            bun install
            cd packages/opencode
            bun run build --single --skip-embed-web-ui
            # Copy the compiled binary to Coffee Mode binaries/
            mkdir -p ../../../binaries
            cp dist/coffeecode-linux-x64/bin/coffeecode ../../../binaries/coffeecode
            echo "✅ CoffeeCode binary built successfully"
            ls -lh ../../../binaries/coffeecode

        - name: Install frontend dependencies
          script: |
            cd src-ui
            npm install --no-audit --no-fund
            cd ..

        - name: Build frontend
          script: |
            cd src-ui
            npm run build
            cd ..

        - name: Build Tauri (Linux .deb + .AppImage)
          script: |
            . "$HOME/.cargo/env"
            cargo install tauri-cli --version "^2"
            cargo tauri build
            echo "═══ Build Artifacts ═══"
            find target/release/bundle -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.rpm" \) | head -20

        - name: Upload artifacts
          script: |
            echo "📦 Linux build artifacts:"
            ls -lh target/release/bundle/deb/ 2>/dev/null || true
            ls -lh target/release/bundle/appimage/ 2>/dev/null || true

    # ── NOTE ──────────────────────────────────────────────────────────────
    # Windows & macOS builds require native runners (WebView2 / Cocoa).
    # - Windows: build locally with `cargo tauri build`
    # - macOS: use GitHub Actions with macos-latest runner
