<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Coffee CLI — Your Multi-Agent AI Terminal Companion." />
    <title>Coffee CLI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apply theme + shape BEFORE React renders to prevent flash of unstyled variables -->
    <script>
      (function() {
        var theme = 'dark';
        var shape = 'soft';
        try { theme = localStorage.getItem('cc-theme') || 'dark'; } catch(e) {}
        try { shape = localStorage.getItem('cc-shape') || 'soft'; } catch(e) {}
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-shape', shape);
      })();
    </script>
    <!-- emulators: DOSBox WASM engine for Coffee Play arcade (no UI deps) -->
    <script src="/js-dos/emulators/emulators.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
