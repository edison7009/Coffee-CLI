# Blueprint: 游戏工作室
# Seed template shipped with Coffee CLI Workstation.
# Loaded at build time via Vite `?raw` import in blueprints.ts.
#
# A blueprint is pure metadata — names, positions, connections.
# No model, no skills, no prompt, no API key. Those belong to the
# user (inside each container).

id: game-studio
name: 游戏工作室
icon: 🎮
description: 典型独立游戏团队：项目经理协调下的程序、美术、剧情、QA 分工
author: '@coffee-cli'

nodes:
  - id: pm
    name: 项目经理
    hint: 协调进度、决策、与用户对接
    position: { x: 240, y: 0 }
  - id: programmer
    name: 主程序
    hint: 引擎、核心系统、性能
    position: { x: -40, y: 160 }
  - id: artist
    name: 主美术
    hint: 视觉风格、关键资产
    position: { x: 180, y: 160 }
  - id: writer
    name: 剧情编剧
    hint: 叙事、分支对话、世界观
    position: { x: 400, y: 160 }
  - id: qa
    name: QA 测试
    hint: 复现 bug、回归验证
    position: { x: 620, y: 160 }

edges:
  - { source: pm, target: programmer }
  - { source: pm, target: artist }
  - { source: pm, target: writer }
  - { source: pm, target: qa }
