<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- SEO & Mobile optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="page-title">Coffee CLI - The Native AI Companion</title>
  <meta name="description" content="Grab a coffee. Let your AI agents handle the rest. A premium AI CLI tool designed for everyone.">
  <!-- Browser Tab Icon (Favicon) -->
  <link rel="icon" type="image/x-icon" href="icons/icon.ico">
  
  <!-- Modern Clean Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  
  <!-- External CSS -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- Ambient Cinematic Background -->
  <div class="ambient-background">
    <!-- Removed Cinematic Video Background to favor Minimalist Theme -->
  </div>

  <!-- Navigation -->
  <header class="navbar">
    <div class="logo">
      <!-- 网页端专属原装动态图标 (Line-MD) -->
      <svg class="dynamic-brand-logo" width="32" height="32" viewBox="0 0 24 24" overflow="visible" xmlns="http://www.w3.org/2000/svg">
        <defs><mask id="SVG5AkzhcyZ"><path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M12 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M16 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4"><animate attributeName="d" dur="3s" repeatCount="indefinite" values="M8 0c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M12 0c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M16 0c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4;M8 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M12 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4M16 -8c0 2 -2 2 -2 4s2 2 2 4s-2 2 -2 4s2 2 2 4"/></path><path d="M4 7h16v0h-16v12h16v-32h-16Z"><animate fill="freeze" attributeName="d" begin="1s" dur="0.6s" to="M4 2h16v5h-16v12h16v-24h-16Z"/></path></mask></defs><g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><path fill="currentColor" fill-opacity="0" stroke-dasharray="48" d="M17 9v9c0 1.66 -1.34 3 -3 3h-6c-1.66 0 -3 -1.34 -3 -3v-9Z"><animate fill="freeze" attributeName="stroke-dashoffset" dur="0.6s" values="48;0"/><animate fill="freeze" attributeName="fill-opacity" begin="1.6s" dur="0.4s" to="1"/></path><path fill="none" stroke-dasharray="16" stroke-dashoffset="16" d="M17 9h3c0.55 0 1 0.45 1 1v3c0 0.55 -0.45 1 -1 1h-3"><animate fill="freeze" attributeName="stroke-dashoffset" begin="0.6s" dur="0.3s" to="0"/></path></g><path fill="currentColor" d="M0 0h24v24H0z" mask="url(#SVG5AkzhcyZ)"/>
      </svg>
      <span data-i18n="logo-text">Coffee CLI</span>
    </div>
    <nav class="nav-links">
      <button class="icon-switch" id="theme-toggle" aria-label="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="theme-icon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
      </button>
      <button class="lang-switch" id="lang-toggle">EN</button>
      <div class="lang-dropdown" id="lang-dropdown">
        <div class="lang-option" data-lang="en">English</div>
        <div class="lang-option" data-lang="zh">简体中文</div>
        <div class="lang-option" data-lang="zh-TW">繁體中文</div>
        <div class="lang-option" data-lang="ja">日本語</div>
        <div class="lang-option" data-lang="ko">한국어</div>
        <div class="lang-option" data-lang="es">Español</div>
        <div class="lang-option" data-lang="fr">Français</div>
        <div class="lang-option" data-lang="de">Deutsch</div>
        <div class="lang-option" data-lang="pt">Português</div>
        <div class="lang-option" data-lang="ru">Русский</div>
      </div>
    </nav>
  </header>

  <!-- Main Hero Section -->
  <main class="hero-section">
    <!-- OPC University Link -->
    <a href="./courses/claude-code.html" class="opc-university-link" id="opc-link">
      <span data-i18n="opc-link">Coffee OPC University</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </a>
    <div class="hero-content">
      <h1 class="headline">
        <span class="static-text" data-i18n="hero-title-1">Enjoy life while you work.</span><br/>
        <span class="static-text" data-i18n="hero-title-2">Coffee CLI for</span>
        <span class="dynamic-wrapper">
          <span id="typewriter" class="type-text"></span><span class="cursor">|</span>
        </span>
      </h1>
      <p class="subtitle" data-i18n="hero-subtitle">
        Tailor-made for you, no coding or English required.
      </p>
    </div>

    <!-- Quick Start Installation Window -->
    <div class="quick-start-container">
      <div class="mac-window">
        <!-- Window Header (Traffic Lights & Tabs) -->
        <div class="window-header">
          <div class="traffic-lights">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          
          <div class="platform-tabs">
            <button class="tab-btn active" data-platform="windows">Windows</button>
            <button class="tab-btn" data-platform="macos">macOS</button>
            <button class="tab-btn" data-platform="linux">Linux</button>
          </div>
          
          <div class="header-spacer"></div>
        </div>

        <!-- Window Body (Instructions & Commands) -->
        <div class="window-body">
          <div class="instruction-hint" id="install-hint">
            Right-click Start > Terminal (Admin) > Paste:
          </div>
          <div class="code-block">
            <span class="prompt-symbol">$</span>
            <code id="install-command">iwr -useb https://coffeecli.com/install.ps1 | iex</code>
            <button id="copy-btn" class="copy-button" aria-label="Copy to clipboard">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
