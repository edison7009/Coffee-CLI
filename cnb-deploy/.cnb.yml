main:
  push:
    - name: build-coffee-code
      docker:
        image: oven/bun:latest
      env:
        COFFEE_CODE_VERSION: "1.0.0"
      stages:
        - name: install
          script:
            - cd packages/opencode
            - bun install --frozen-lockfile

        - name: build-linux-x64
          script:
            - cd packages/opencode
            - bun run build --single --target bun-linux-x64
            - mv dist/coffeecode dist/coffee-code-linux-x64
            - chmod +x dist/coffee-code-linux-x64

        - name: build-linux-arm64
          script:
            - cd packages/opencode
            - bun run build --single --target bun-linux-arm64
            - mv dist/coffeecode dist/coffee-code-linux-arm64
            - chmod +x dist/coffee-code-linux-arm64

        - name: build-macos-x64
          script:
            - cd packages/opencode
            - bun run build --single --target bun-darwin-x64
            - mv dist/coffeecode dist/coffee-code-darwin-x64

        - name: build-macos-arm64
          script:
            - cd packages/opencode
            - bun run build --single --target bun-darwin-arm64
            - mv dist/coffeecode dist/coffee-code-darwin-arm64

        - name: build-windows-x64
          script:
            - cd packages/opencode
            - bun run build --single --target bun-windows-x64
            - mv dist/coffeecode.exe dist/coffee-code-windows-x64.exe

        - name: list-artifacts
          script:
            - ls -la packages/opencode/dist/
